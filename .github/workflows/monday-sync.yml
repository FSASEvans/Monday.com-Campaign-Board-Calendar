name: Monday Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1-5"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Pull Monday board and generate JSON
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          MONDAY_BOARD_ID: ${{ vars.MONDAY_BOARD_ID }}
        run: node scripts/monday-sync.mjs
      - name: Commit data changes
        run: |
          git add data/latest.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh monday dashboard data"
          git push
